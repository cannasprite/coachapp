<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COACH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1f1f1f;
      --border: rgba(255,255,255,0.08); --border-accent: rgba(184,255,87,0.2);
      --text: #f0f0f0; --muted: #888; --accent: #b8ff57;
      --night: #7b6fff; --pink: #ff7eb3; --warn: #ff9f43;
      --glass: rgba(255,255,255,0.03);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Syne', sans-serif;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      padding-bottom: 88px;
    }

    /* Card style */
    .card {
      background: linear-gradient(160deg, #1e1e1e 0%, #181818 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 12px rgba(0,0,0,0.4);
    }

    /* Tab panels */
    .tab-panel {
      display: none;
      padding: 16px;
    }

    .tab-panel.active {
      display: block;
    }

    /* Bottom nav */
    nav#bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 8px 4px 16px;
      z-index: 100;
    }

    .nav-tabs {
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 2px;
    }

    .nav-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 8px;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      line-height: 1;
      min-width: 44px;
      transition: color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-tab svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .nav-tab:hover {
      color: var(--text);
      background: var(--glass);
    }

    .nav-tab.active {
      color: var(--accent);
      background: rgba(184, 255, 87, 0.08);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="tab-today"  class="tab-panel active"></div>
    <div id="tab-train"  class="tab-panel"></div>
    <div id="tab-eat"    class="tab-panel"></div>
    <div id="tab-stats"  class="tab-panel"></div>
    <div id="tab-chat"   class="tab-panel"></div>
    <div id="tab-journal" class="tab-panel"></div>
    <div id="tab-more"   class="tab-panel"></div>

    <nav id="bottom-nav">
      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="today">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Today
        </button>
        <button class="nav-tab" data-tab="train">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 4v16M18 4v16M2 8h4M18 8h4M2 16h4M18 16h4"/>
          </svg>
          Train
        </button>
        <button class="nav-tab" data-tab="eat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
          </svg>
          Eat
        </button>
        <button class="nav-tab" data-tab="stats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          Stats
        </button>
        <button class="nav-tab" data-tab="chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Chat
        </button>
        <button class="nav-tab" data-tab="journal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          Journal
        </button>
        <button class="nav-tab" data-tab="more">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
          </svg>
          More
        </button>
      </div>
    </nav>
  </div>

  <script>
    (function () {
      const tabs = document.querySelectorAll('.nav-tab');
      const panels = document.querySelectorAll('.tab-panel');

      function showTab(id) {
        tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === id));
        panels.forEach(p => p.classList.toggle('active', p.id === 'tab-' + id));
      }

      tabs.forEach(tab => {
        tab.addEventListener('click', () => showTab(tab.dataset.tab));
      });

      showTab('today');
    })();
  </script>
</body>
</html>
